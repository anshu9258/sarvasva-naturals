spring.application.name=sarvasvanaturals

# ==========================================

# DATABASE (RAILWAY MYSQL)

# ==========================================

spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.globally_quoted_identifiers_skip_column_definitions=true

# ==========================================

# SERVER

# ==========================================

server.port=${PORT:8080}

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

server.forward-headers-strategy=framework

# ==========================================

# THYMELEAF

# ==========================================

spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ==========================================

# FILE UPLOAD

# ==========================================

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================

# MAIL

# ==========================================

spring.mail.host=smtp.gmail.com
spring.mail.port=587

spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ==========================================

# RAZORPAY

# ==========================================

razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}
razorpay.currency=INR

# ==========================================

# STRIPE

# ==========================================

stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}
stripe.currency=usd

# ==========================================

# CLOUDINARY

# ==========================================

cloudinary.cloud.name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api.key=${CLOUDINARY_API_KEY}
cloudinary.api.secret=${CLOUDINARY_API_SECRET}

# ==========================================

# APPLICATION

# ==========================================

app.name=Sarvasva Naturals
app.base.url=${APP_BASE_URL}

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}

# ==========================================

# SHIPPING

# ==========================================

shipping.free.above=999
shipping.standard.charge=99
shipping.express.charge=199

# ==========================================

# GST

# ==========================================

gst.rate=18

# ==========================================

# LOGGING

# ==========================================

logging.level.com.sarvasvanaturals=INFO
logging.level.org.springframework.security=WARN

# ==========================================

# PERFORMANCE

# ==========================================

spring.jpa.open-in-view=false

server.tomcat.threads.max=200
server.tomcat.connection-timeout=5000

spring.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true

# ==========================================

# BRANDING

# ==========================================

app.tagline=Rooted in Ayurveda. Made for Wellness.
app.description=Premium Ayurvedic spices backed by laboratory science. HPLC verified, farm direct, zero toxins.
app.keywords=ayurvedic spices, organic turmeric, HPLC verified, farm direct spices, sarvasva naturals

# ==========================================

# CONTACT

# ==========================================

app.contact.email=[Yogesh.saarth@gmail.com](mailto:Yogesh.saarth@gmail.com)
app.contact.phone=+91 98687 26202

app.social.instagram=https://www.instagram.com/sarvasva.naturals
app.social.facebook=https://www.facebook.com/share/1CnCt3kfpa/
