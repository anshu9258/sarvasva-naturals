# ================================
# SARVASVA NATURALS - APPLICATION CONFIG
# ================================

spring.application.name=sarvasvanaturals

# ===== DATABASE (Switch to MySQL in prod) =====
# DEV: H2 In-Memory
spring.datasource.url=jdbc:h2:mem:sarvasvadb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# PROD: MySQL (uncomment and fill)
# spring.datasource.url=jdbc:mysql://localhost:3306/sarvasvadb?useSSL=false&serverTimezone=UTC
# spring.datasource.username=your_mysql_user
# spring.datasource.password=your_mysql_password
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.globally_quoted_identifiers_skip_column_definitions=true

# ===== SERVER =====
server.port=8082
server.error.include-message=always

# ===== THYMELEAF =====
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===== FILE UPLOAD =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== MAIL =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===== PAYMENT GATEWAYS =====
# Razorpay (Primary - India)
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_YOUR_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:YOUR_SECRET}
razorpay.currency=INR

# Stripe (International)
stripe.secret.key=${STRIPE_SECRET_KEY:sk_test_YOUR_STRIPE_SECRET}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:pk_test_YOUR_STRIPE_PUBLISHABLE}
stripe.currency=usd
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_YOUR_WEBHOOK_SECRET}

# ===== CLOUDINARY (Image Storage) =====
cloudinary.cloud.name=${CLOUDINARY_CLOUD_NAME:your_cloud_name}
cloudinary.api.key=${CLOUDINARY_API_KEY:your_api_key}
cloudinary.api.secret=${CLOUDINARY_API_SECRET:your_api_secret}

# ===== APP SETTINGS =====
app.name=Sarvasva Naturals
app.base.url=http://localhost:8080
app.jwt.secret=${JWT_SECRET:SarvasvaNaturalsSecretKey2024VeryLongSecretKeyForJWT}
app.jwt.expiration=86400000
app.admin.email=${ADMIN_EMAIL:admin@sarvasvanaturals.com}
app.admin.password=${ADMIN_PASSWORD:Admin@123}

# ===== SHIPPING =====
shipping.free.above=999
shipping.standard.charge=99
shipping.express.charge=199

# ===== GST =====
gst.rate=18

# ===== LOGGING =====
logging.level.com.sarvasvanaturals=DEBUG
logging.level.org.springframework.security=WARN

# ===== MAIL - make optional so app starts without real email config =====
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===== SEO & BRANDING =====
app.tagline=Rooted in Ayurveda. Made for Wellness.
app.description=Premium Ayurvedic spices backed by laboratory science. HPLC verified, farm direct, zero toxins.
app.keywords=ayurvedic spices, organic turmeric, HPLC verified, farm direct spices, sarvasva naturals

# ===== PRODUCTION READY SETTINGS =====
spring.jpa.open-in-view=false
server.tomcat.max-threads=200
server.tomcat.connection-timeout=5000
spring.servlet.session.timeout=30m

# ===== CONTACT =====
app.contact.email=Yogesh.saarth@gmail.com
app.contact.phone=+91 98687 26202
app.social.instagram=https://www.instagram.com/sarvasva.naturals
app.social.facebook=https://www.facebook.com/share/1CnCt3kfpa/
