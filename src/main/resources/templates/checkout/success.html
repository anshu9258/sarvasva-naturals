<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Order Confirmed | Sarvasva Naturals</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>html{scroll-padding-top:110px;scroll-behavior:smooth;}</style>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png"/>
</head>
<body class="page-loaded">
<nav class="navbar"><div class="nav-container">
  <a href="/" class="nav-logo"><img src="/images/logo-web.png" alt="Sarvasva Naturals" style="height:44px;width:auto;object-fit:contain;"></a>
</div></nav>

<div class="success-page">
  <div class="success-card">
    <div class="success-icon"><i class="fas fa-check"></i></div>
    <h1>Order Confirmed!</h1>
    <p>Thank you for your order. We've sent a confirmation email and will notify you once your package ships.</p>
    <div class="order-number-badge">
      Order #<span th:text="${order.orderNumber}"></span>
    </div>
    <!-- Order Items Summary -->
    <div style="text-align:left;margin-bottom:24px;">
      <div th:each="item : ${order.items}"
           style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);">
        <img th:src="${item.product.mainImageUrl}" style="width:48px;height:48px;border-radius:8px;object-fit:cover;">
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:500;" th:text="${item.productName}"></div>
          <div style="font-size:12px;color:var(--text-muted);" th:text="'Qty: '+${item.quantity}+(item.selectedWeight!=null?' · '+item.selectedWeight:'')"></div>
        </div>
        <div style="font-weight:600;" th:text="'₹'+${item.subtotal}"></div>
      </div>
      <div style="display:flex;justify-content:space-between;padding:12px 0;font-weight:700;font-size:16px;color:var(--forest);">
        <span>Total Paid</span>
        <span th:text="'₹'+${order.totalAmount}"></span>
      </div>
    </div>
    <div style="background:var(--warm);border-radius:12px;padding:16px;text-align:left;margin-bottom:24px;font-size:14px;">
      <div style="font-weight:600;margin-bottom:8px;"><i class="fas fa-truck" style="color:var(--sage);"></i> Delivering to:</div>
      <div th:text="${order.shippingName}"></div>
      <div th:text="${order.shippingAddressLine1}+', '+${order.shippingCity}+' - '+${order.shippingPincode}" style="color:var(--text-muted);"></div>
    </div>
    <div class="success-actions">
      <a th:href="@{/account/orders/{n}(n=${order.orderNumber})}" class="btn-forest">Track Order</a>
      <a href="/shop" class="btn-outline">Continue Shopping</a>
    </div>
  </div>
</div>
</body>
</html>
