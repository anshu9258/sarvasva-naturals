<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Complete Payment | Sarvasva Naturals</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <!-- Razorpay SDK -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <!-- Stripe SDK -->
  <script src="https://js.stripe.com/v3/"></script>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png"/>
</head>
<body style="background:var(--cream);">
<nav class="navbar">
  <div class="nav-container">
    <a href="/" class="nav-logo"><img src="/images/logo-web.png" alt="Sarvasva Naturals" style="height:44px;width:auto;object-fit:contain;"></a>
    <span style="margin-left:auto;font-size:13px;color:var(--text-muted);"><i class="fas fa-lock" style="color:var(--sage);"></i> Secure Payment</span>
  </div>
</nav>

<div style="max-width:560px;margin:60px auto;padding:0 24px;">
  <!-- Razorpay Payment -->
  <div th:if="${razorpayData}" style="background:white;border-radius:var(--radius-xl);padding:48px;text-align:center;box-shadow:var(--shadow-xl);">
    <div style="font-size:48px;margin-bottom:20px;">💳</div>
    <h2 style="font-family:var(--font-display);color:var(--forest);margin-bottom:8px;">Complete Your Payment</h2>
    <p style="color:var(--text-muted);margin-bottom:32px;">Order <strong th:text="${order.orderNumber}"></strong></p>
    <div style="background:var(--warm);border-radius:12px;padding:20px;margin-bottom:32px;">
      <div style="font-size:32px;font-weight:700;color:var(--forest);" th:text="'₹' + ${order.totalAmount}"></div>
      <div style="font-size:13px;color:var(--text-muted);margin-top:4px;">Total Amount</div>
    </div>
    <button onclick="initRazorpay(razorpayData)" class="btn-forest" style="width:100%;justify-content:center;display:flex;font-size:16px;padding:18px;">
      <i class="fas fa-lock"></i> &nbsp; Pay ₹<span th:text="${order.totalAmount}"></span> Securely
    </button>
    <p style="font-size:12px;color:var(--text-muted);margin-top:16px;">UPI · Net Banking · Cards · Wallets</p>
  </div>

  <!-- Stripe Payment -->
  <div th:if="${stripeData}" style="background:white;border-radius:var(--radius-xl);padding:48px;box-shadow:var(--shadow-xl);">
    <h2 style="font-family:var(--font-display);color:var(--forest);margin-bottom:8px;text-align:center;">Card Payment</h2>
    <p style="color:var(--text-muted);text-align:center;margin-bottom:32px;">Order <strong th:text="${order.orderNumber}"></strong> · ₹<strong th:text="${order.totalAmount}"></strong></p>
    <form id="stripeForm">
      <div style="margin-bottom:24px;">
        <label style="font-size:13px;font-weight:600;margin-bottom:8px;display:block;">Card Details</label>
        <div id="stripe-card-element" style="border:1.5px solid var(--border);border-radius:8px;padding:14px;"></div>
        <div id="stripe-error" style="color:#c62828;font-size:13px;margin-top:8px;"></div>
      </div>
      <button type="submit" class="btn-forest" style="width:100%;justify-content:center;display:flex;font-size:16px;padding:18px;">
        <i class="fas fa-lock"></i> &nbsp; Pay Now
      </button>
    </form>
  </div>
</div>

<script src="/js/main.js" defer></script>
<script th:if="${razorpayData}" th:inline="javascript">
  const razorpayData = {
    keyId:          /*[[${razorpayData.keyId}]]*/ '',
    amount:         /*[[${razorpayData.amount}]]*/ 0,
    currency:       /*[[${razorpayData.currency}]]*/ 'INR',
    razorpayOrderId:/*[[${razorpayData.razorpayOrderId}]]*/ '',
    orderNumber:    /*[[${razorpayData.orderNumber}]]*/ '',
    customerName:   /*[[${razorpayData.customerName}]]*/ '',
    customerEmail:  /*[[${razorpayData.customerEmail}]]*/ '',
    customerPhone:  /*[[${razorpayData.customerPhone}]]*/ ''
  };
  // Auto-open Razorpay
  window.addEventListener('load', () => setTimeout(() => initRazorpay(razorpayData), 500));
</script>
<script th:if="${stripeData}" th:inline="javascript">
  const stripeData = {
    publishableKey: /*[[${stripeData.publishableKey}]]*/ '',
    clientSecret:   /*[[${stripeData.clientSecret}]]*/ '',
    orderNumber:    /*[[${stripeData.orderNumber}]]*/ ''
  };
  window.addEventListener('load', () => initStripe(stripeData));
</script>
</body>
</html>
