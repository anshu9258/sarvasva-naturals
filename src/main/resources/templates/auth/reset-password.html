<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reset Password | Sarvasva Naturals</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>html{scroll-padding-top:110px;scroll-behavior:smooth;}</style>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png"/>
</head>
<body class="page-loaded">
<div class="auth-page">
  <div class="auth-visual">
    <div class="auth-visual-logo">Sarvasva Naturals</div>
    <div class="auth-visual-tagline">Create a strong new password</div>
    <div class="auth-visual-facts">
      <div class="auth-fact"><div class="auth-fact-icon"><i class="fas fa-key"></i></div>Use 8+ characters</div>
      <div class="auth-fact"><div class="auth-fact-icon"><i class="fas fa-shield-alt"></i></div>Mix letters, numbers &amp; symbols</div>
    </div>
  </div>
  <div class="auth-form-side">
    <div class="auth-form-box">
      <h2>Set New Password</h2>
      <p>Enter your new password below.</p>
      <div th:if="${error}" style="background:#ffebee;border-radius:8px;padding:12px 16px;color:#c62828;font-size:14px;margin-bottom:20px;">
        <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
      </div>
      <form method="post" action="/reset-password">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="token" th:value="${token}"/>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input type="password" name="password" id="newPwd" class="form-control" required minlength="8" placeholder="Min. 8 characters">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="confirmPwd" class="form-control" required minlength="8" placeholder="Repeat your password">
          <div id="pwdError" style="color:#c62828;font-size:12px;margin-top:4px;display:none;">Passwords do not match</div>
        </div>
        <button type="submit" class="btn-forest" style="width:100%;justify-content:center;">
          Reset Password <i class="fas fa-check"></i>
        </button>
      </form>
      <div class="auth-link"><a href="/login">← Back to Login</a></div>
    </div>
  </div>
</div>
<script>
document.querySelector('form').addEventListener('submit', function(e) {
  const p1 = document.getElementById('newPwd').value;
  const p2 = document.getElementById('confirmPwd').value;
  if (p1 !== p2) {
    e.preventDefault();
    document.getElementById('pwdError').style.display = 'block';
  }
});
</script>
</body>
</html>
