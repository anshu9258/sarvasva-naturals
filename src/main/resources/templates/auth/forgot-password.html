<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Forgot Password | Sarvasva Naturals</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>html{scroll-padding-top:110px;scroll-behavior:smooth;}</style>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png"/>
</head>
<body class="page-loaded">
<div class="auth-page">
  <div class="auth-visual">
    <div class="auth-visual-logo">Sarvasva Naturals</div>
    <div class="auth-visual-tagline">Reset Your Password</div>
    <div class="auth-visual-facts">
      <div class="auth-fact"><div class="auth-fact-icon"><i class="fas fa-envelope"></i></div>Check your inbox for reset link</div>
      <div class="auth-fact"><div class="auth-fact-icon"><i class="fas fa-clock"></i></div>Link valid for 1 hour</div>
      <div class="auth-fact"><div class="auth-fact-icon"><i class="fas fa-lock"></i></div>Fully encrypted &amp; secure</div>
    </div>
  </div>
  <div class="auth-form-side">
    <div class="auth-form-box">
      <h2>Forgot Password?</h2>
      <p>Enter your email address and we'll send you a link to reset your password.</p>

      <div th:if="${success}" style="background:#e8f5e9;border-radius:8px;padding:12px 16px;color:#1b5e20;font-size:14px;margin-bottom:20px;">
        <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
      </div>

      <form method="post" action="/forgot-password">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus>
        </div>
        <button type="submit" class="btn-forest" style="width:100%;justify-content:center;">
          Send Reset Link <i class="fas fa-paper-plane"></i>
        </button>
      </form>
      <div class="auth-link"><a href="/login">← Back to Login</a></div>
    </div>
  </div>
</div>
</body>
</html>
