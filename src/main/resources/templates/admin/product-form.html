<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Product Form | Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>html{scroll-padding-top:110px;scroll-behavior:smooth;}</style>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png"/>
</head>
<body class="page-loaded">
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-logo">Sarvasva Naturals<br><span style="font-size:11px;color:var(--sage-lt);font-family:var(--font-body);">Admin Panel</span></div>
    <nav class="admin-nav">
      <a href="/admin"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="/admin/products" class="active"><i class="fas fa-box-open"></i> Products</a>
      <a href="/admin/categories"><i class="fas fa-tags"></i> Categories</a>
      <a href="/admin/orders"><i class="fas fa-shopping-cart"></i> Orders</a>
      <a href="/admin/coupons"><i class="fas fa-percent"></i> Coupons</a>
      <a href="/admin/settings"><i class="fas fa-cog"></i> Settings</a>
      <div style="border-top:1px solid rgba(255,255,255,0.1);margin:16px 0;"></div>
      <a href="/"><i class="fas fa-home"></i> View Store</a>
      <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
  </aside>
  <main class="admin-main">
    <div class="admin-header">
      <h1 th:text="${product.id != null} ? 'Edit Product' : 'Add New Product'">Product Form</h1>
      <a href="/admin/products" class="btn-outline">← Back to Products</a>
    </div>

    <form action="/admin/products/save" method="post" style="display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" name="id" th:value="${product.id}"/>

      <!-- Left: Main details -->
      <div style="display:flex;flex-direction:column;gap:20px;">
        <div style="background:white;border-radius:12px;padding:24px;box-shadow:var(--shadow-sm);">
          <h3 style="font-family:var(--font-display);font-size:18px;color:var(--forest);margin-bottom:20px;">Basic Information</h3>
          <div class="form-group">
            <label class="form-label">Product Name *</label>
            <input type="text" name="name" class="form-control" th:value="${product.name}" required
                   oninput="autoSlug(this.value)" placeholder="e.g. Organic Rajapuri Curcumin Turmeric">
          </div>
          <div class="form-group">
            <label class="form-label">URL Slug</label>
            <input type="text" name="slug" id="slugField" class="form-control" th:value="${product.slug}"
                   placeholder="auto-generated from name">
          </div>
          <div class="form-group">
            <label class="form-label">Short Description</label>
            <input type="text" name="shortDescription" class="form-control" th:value="${product.shortDescription}"
                   placeholder="Brief tagline for product cards">
          </div>
          <div class="form-group">
            <label class="form-label">Full Description *</label>
            <textarea name="description" class="form-control" rows="6" required
                      placeholder="Detailed product description, origin story, lab results..."
                      th:text="${product.description}"></textarea>
          </div>
        </div>

        <div style="background:white;border-radius:12px;padding:24px;box-shadow:var(--shadow-sm);">
          <h3 style="font-family:var(--font-display);font-size:18px;color:var(--forest);margin-bottom:20px;">Pricing &amp; Stock</h3>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;">
            <div class="form-group">
              <label class="form-label">Price (₹) *</label>
              <input type="number" name="price" class="form-control" th:value="${product.price}"
                     step="0.01" required min="0" placeholder="18.00">
            </div>
            <div class="form-group">
              <label class="form-label">Original Price (₹)</label>
              <input type="number" name="originalPrice" class="form-control" th:value="${product.originalPrice}"
                     step="0.01" min="0" placeholder="24.00 (for discount)">
            </div>
            <div class="form-group">
              <label class="form-label">Stock Quantity *</label>
              <input type="number" name="stockQuantity" class="form-control" th:value="${product.stockQuantity}"
                     required min="0" placeholder="100">
            </div>
          </div>
        </div>

        <div style="background:white;border-radius:12px;padding:24px;box-shadow:var(--shadow-sm);">
          <h3 style="font-family:var(--font-display);font-size:18px;color:var(--forest);margin-bottom:20px;">Origin &amp; Quality</h3>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="form-group">
              <label class="form-label">Origin</label>
              <input type="text" name="origin" class="form-control" th:value="${product.origin}" placeholder="Maharashtra, India">
            </div>
            <div class="form-group">
              <label class="form-label">Variety</label>
              <input type="text" name="variety" class="form-control" th:value="${product.variety}" placeholder="Rajapuri">
            </div>
            <div class="form-group">
              <label class="form-label">Curcumin Content</label>
              <input type="text" name="curcuminContent" class="form-control" th:value="${product.curcuminContent}" placeholder="9.5%">
            </div>
            <div class="form-group">
              <label class="form-label">Batch Code</label>
              <input type="text" name="batchCode" class="form-control" th:value="${product.batchCode}" placeholder="SN-2024-001">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Weight Options (comma-separated)</label>
            <input type="text" name="weightOptions" class="form-control" th:value="${product.weightOptions}" placeholder="50g,100g,200g,500g">
          </div>
          <div class="form-group">
            <label class="form-label">Tags (comma-separated)</label>
            <input type="text" name="tags" class="form-control" th:value="${product.tags}" placeholder="turmeric,organic,hplc">
          </div>
        </div>
      </div>

      <!-- Right: Category, Image, Settings -->
      <div style="display:flex;flex-direction:column;gap:20px;position:sticky;top:24px;">
        <div style="background:white;border-radius:12px;padding:24px;box-shadow:var(--shadow-sm);">
          <h3 style="font-family:var(--font-display);font-size:18px;color:var(--forest);margin-bottom:20px;">Category</h3>
          <div class="form-group">
            <label class="form-label">Category *</label>
            <select name="categoryId" class="form-control" required>
              <option value="">Select category...</option>
              <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                      th:selected="${product.category?.id == cat.id}"></option>
            </select>
          </div>
        </div>

        <div style="background:white;border-radius:12px;padding:24px;box-shadow:var(--shadow-sm);">
          <h3 style="font-family:var(--font-display);font-size:18px;color:var(--forest);margin-bottom:20px;">Product Image</h3>
          <div class="form-group">
            <label class="form-label">Image URL</label>
            <input type="url" name="imageUrl" id="imageUrlInput" class="form-control"
                   th:value="${not #lists.isEmpty(product.images)} ? ${product.images[0].imageUrl} : ''"
                   placeholder="https://... (Unsplash, Cloudinary)"
                   oninput="previewImage(this.value)">
          </div>
          <div id="imagePreview" style="margin-top:12px;border-radius:10px;overflow:hidden;aspect-ratio:4/3;background:var(--warm);display:flex;align-items:center;justify-content:center;">
            <img th:if="${not #lists.isEmpty(product.images)}"
                 th:src="${product.images[0].imageUrl}" style="width:100%;height:100%;object-fit:cover;"
                 id="previewImg">
            <span th:if="${#lists.isEmpty(product.images)}" style="color:var(--text-muted);font-size:13px;" id="previewPlaceholder">
              Image preview
            </span>
          </div>
        </div>

        <div style="background:white;border-radius:12px;padding:24px;box-shadow:var(--shadow-sm);">
          <h3 style="font-family:var(--font-display);font-size:18px;color:var(--forest);margin-bottom:20px;">Settings</h3>
          <div style="display:flex;flex-direction:column;gap:14px;">
            <label style="display:flex;align-items:center;gap:12px;cursor:pointer;">
              <input type="checkbox" name="active" th:checked="${product.active}" style="accent-color:var(--forest);width:18px;height:18px;">
              <div><div style="font-weight:500;font-size:14px;">Active (Visible in store)</div></div>
            </label>
            <label style="display:flex;align-items:center;gap:12px;cursor:pointer;">
              <input type="checkbox" name="featured" th:checked="${product.featured}" style="accent-color:var(--forest);width:18px;height:18px;">
              <div><div style="font-weight:500;font-size:14px;">Featured Product</div></div>
            </label>
            <label style="display:flex;align-items:center;gap:12px;cursor:pointer;">
              <input type="checkbox" name="bestSeller" th:checked="${product.bestSeller}" style="accent-color:var(--forest);width:18px;height:18px;">
              <div><div style="font-weight:500;font-size:14px;">Best Seller Badge</div></div>
            </label>
          </div>
        </div>

        <button type="submit" class="btn-forest" style="justify-content:center;font-size:16px;padding:16px;">
          <i class="fas fa-save"></i>
          <span th:text="${product.id != null} ? 'Update Product' : 'Save Product'">Save</span>
        </button>
      </div>
    </form>
  </main>
</div>
<script src="/js/main.js" defer></script>
<script>
function autoSlug(val) {
  const slug = val.toLowerCase().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').trim();
  document.getElementById('slugField').value = slug;
}
function previewImage(url) {
  const container = document.getElementById('imagePreview');
  let img = document.getElementById('previewImg');
  const placeholder = document.getElementById('previewPlaceholder');
  if (url) {
    if (!img) {
      img = document.createElement('img');
      img.id = 'previewImg';
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
      container.appendChild(img);
    }
    img.src = url;
    if (placeholder) placeholder.style.display = 'none';
  }
}
</script>
</body>
</html>
